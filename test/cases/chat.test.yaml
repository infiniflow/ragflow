# dataset.test.yaml
suite: dataset.tests

base: base.yaml

tear_up:
  - server: api
    command: login user 'aaa@aaa.com' password 'aaa'
tear_down:
  - server: api
    command: logout

tests:
  - server: admin
  - test: login admin
    command: login admin 'admin@ragflow.io' password 'admin'
    expect:
      status: success

  - test: list services
    command: list services
    expect:
      status: success
      data:
        id: $service_id
        name: sample-service
  - server: api
  - command: login user 'aaa@aaa.com' password 'aaa'
    expect:
      status: success
  # case 1: List datasets
  - test: List datasets
    command: list datasets
    expect:
      status: success
      data:
        id: $document_id
        name: sample.pdf

  # case 2: show dataset
  - test: show dataset
    run: show dataset 'aaa';
    expect:
      status: success
      expect:
        id: $document_id


