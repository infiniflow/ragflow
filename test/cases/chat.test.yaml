# dataset.test.yaml
suite: dataset.tests

base: base.yaml

tear_up:
  - server: api
    command: login user 'aaa@aaa.com' password 'aaa'
tear_down:
  - server: api
    command: logout

tests:
  # case 1: List datasets
  - test: List datasets
    command: list datasets
    expect:
      status: success
      data:
        id: $document_id
        name: sample.pdf

  # case 2: show dataset
  - test: show dataset
    run: show dataset 'aaa';
    expect:
      status: success
      expect:
        id: $document_id