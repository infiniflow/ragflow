ragflow:
  host: 0.0.0.0
  http_port: 9380
admin:
  host: 0.0.0.0
  http_port: 9381
mysql:
  name: 'rag_flow'
  user: 'root'
  password: 'infini_rag_flow'
  host: 'mysql'
  port: 3306
  max_connections: 900
  stale_timeout: 300
  max_allowed_packet: 1073741824
minio:
  user: 'rag_flow'
  password: 'infini_rag_flow'
  host: 'minio:9000'
  bucket: ''
  prefix_path: ''
  # optional: set to true for HTTPS (SSL/TLS). Used by MinIO client and health check.
  # secure: false
  # optional: set to false to allow self-signed certificates (e.g. in development).
  # verify: true
es:
  hosts: 'http://es01:9200'
  username: 'elastic'
  password: 'infini_rag_flow'
os:
  hosts: 'http://opensearch01:9201'
  username: 'admin'
  password: 'infini_rag_flow_OS_01'
  # Optional hybrid (BM25 + KNN) search tuning. The connector self-provisions the
  # normalization search pipeline on start-up (requires OpenSearch >= 2.10).
  # hybrid_search_pipeline: 'ragflow_hybrid_pipeline'
  # hybrid_search_weights: [0.5, 0.5]   # [text/BM25 leg, vector/KNN leg]
infinity:
  uri: 'infinity:23817'
  postgres_port: 5432
  db_name: 'default_db'
oceanbase:
  scheme: 'oceanbase' # set 'mysql' to create connection using mysql config
  config:
    db_name: 'ragflow_doc'
    user: 'root@ragflow'
    password: 'infini_rag_flow'
    host: 'oceanbase'
    port: 2881
seekdb:
  scheme: 'oceanbase' # SeekDB is the lite version of OceanBase
  config:
    db_name: 'ragflow_doc'
    user: 'root'
    password: 'infini_rag_flow'
    host: 'seekdb'
    port: 2881
redis:
  db: 1
  username: ''
  password: 'infini_rag_flow'
  host: 'redis:6379'
user_default_llm:
  default_models:
    embedding_model:
      api_key: 'xxx'
      base_url: 'http://tei:80'
