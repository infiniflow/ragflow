<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <!-- 红色圆形背景 -->
 <!--   <circle cx="100" cy="100" r="90" fill="#E53935"/>-->

    <!-- 原子轨道 - 三条白色弧线 -->
    <g fill="none" stroke="white" stroke-width="8" stroke-linecap="round">
        <!-- 轨道1: 垂直椭圆 -->
        <ellipse cx="100" cy="100" rx="35" ry="75" transform="rotate(0 100 100)"/>
        <!-- 轨道2: 右倾60度 -->
        <ellipse cx="100" cy="100" rx="35" ry="75" transform="rotate(60 100 100)"/>
        <!-- 轨道3: 左倾60度 -->
        <ellipse cx="100" cy="100" rx="35" ry="75" transform="rotate(-60 100 100)"/>
    </g>

    <!-- 中心原子核 -->
    <circle cx="100" cy="100" r="14" fill="white"/>

    <!-- 右下角电子 -->
    <circle cx="152" cy="145" r="10" fill="white"/>
</svg>
