name: Build Multi-Arch Ragflow (development)

on:
  workflow_dispatch:
  push:
    branches: [ "development" ]

jobs:
  build-ragflow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1) Prepare Python env and download deps so COPY/mount works
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps for download_deps.py
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install huggingface_hub nltk tiktoken requests
          fi

      - name: Run download_deps.py
        run: |
          python download_deps.py
          ls -R

      # 2) Enable cross-build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------- AMD64 ----------
      - name: Build ragflow_deps (AMD64) locally
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.deps \
            -t infiniflow/ragflow_deps:latest \
            . --load

      - name: Build & Push Ragflow (AMD64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t eurodoc/medlibre-ragflow:amd64-dev \
            --push .

      # ---------- ARM64 ----------
      - name: Build ragflow_deps (ARM64) locally
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile.deps \
            -t infiniflow/ragflow_deps:latest \
            . --load

      - name: Build & Push Ragflow (ARM64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile \
            -t eurodoc/medlibre-ragflow:arm64-dev \
            --push .

      # ---------- MANIFEST (generic tag) ----------
      - name: Create & Push multi-arch manifest eurodoc/medlibre-ragflow:dev
        run: |
          docker buildx imagetools create \
            -t eurodoc/medlibre-ragflow:dev \
            eurodoc/medlibre-ragflow:amd64-dev \
            eurodoc/medlibre-ragflow:arm64-dev

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect eurodoc/medlibre-ragflow:dev
