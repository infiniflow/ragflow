# Alembic configuration for RAGFlow
# See docs/proposals/peewee-to-sqlalchemy.md for migration strategy.
#
# Run migrations:
#   alembic upgrade head          # apply all pending migrations
#   alembic downgrade -1          # roll back one migration
#   alembic revision --autogenerate -m "describe change"   # generate new migration

[alembic]
script_location = api/db/alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .

# Database URL is built at runtime by api/db/sqlalchemy_engine.py from
# common/settings.py — do not hard-code credentials here.
# The env.py reads the URL from the engine directly.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
